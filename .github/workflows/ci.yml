name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [app, dashboard, landing]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        # Version is read from the root package.json "packageManager" field.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter ${{ matrix.app }} run --if-present lint

      - name: Build
        run: pnpm --filter ${{ matrix.app }} run build

      - name: Test
        run: pnpm --filter ${{ matrix.app }} run --if-present test

      # E2E runs only for shells that ship a Playwright config, so the browser
      # download is skipped for shells that don't have e2e yet.
      - name: Cache Playwright browsers
        if: hashFiles(format('apps/{0}/playwright.config.ts', matrix.app)) != ''
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # Invalidate when the Playwright version (in the lockfile) changes.
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browser
        if: hashFiles(format('apps/{0}/playwright.config.ts', matrix.app)) != ''
        run: pnpm --filter ${{ matrix.app }} exec playwright install --with-deps chromium

      - name: E2E
        if: hashFiles(format('apps/{0}/playwright.config.ts', matrix.app)) != ''
        run: pnpm --filter ${{ matrix.app }} run e2e

  # Guards the repo's central invariant: every shell's vendored theme.css must
  # match the canonical source (packages/design/src/theme.css). Re-running the
  # sync must produce no diff; otherwise a copy drifted and CI fails.
  tokens:
    name: token sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify vendored tokens are in sync
        run: |
          node scripts/sync-tokens.mjs
          if ! git diff --quiet; then
            echo "::error::Vendored theme.css is out of sync with packages/design/src/theme.css. Run 'pnpm sync:tokens' and commit the result."
            git --no-pager diff --stat
            exit 1
          fi
